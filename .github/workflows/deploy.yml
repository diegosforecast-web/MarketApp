name: Deploy to Cloud Run

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
 
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up gcloud
      uses: google-github-actions/setup-gcloud@v1

    - name: Configure Docker for Artifact Registry
      run: gcloud auth configure-docker us-central1-docker.pkg.dev

    - name: Build and Push Image
      run: |
        docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/market-forecast/marketapp:latest .
        docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/market-forecast/marketapp:latest

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy market-forecast-staging \
          --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/market-forecast/marketapp:latest \
          --region us-central 1\
          --platform managed \
          --allow-unauthenticated
